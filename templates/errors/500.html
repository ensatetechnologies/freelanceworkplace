{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Freelance Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 6rem;"></i>
                </div>
                <h1 class="display-1 fw-bold text-danger">500</h1>
                <h2 class="fw-bold mb-3">Server Error</h2>
                <p class="text-muted mb-4">
                    Something went wrong on our end. We're working to fix it.
                    Please try again later.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="/" class="btn btn-primary">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                    <button onclick="location.reload()" class="btn btn-outline-primary">
                        <i class="bi bi-arrow-clockwise me-2"></i>Try Again
                    </button>
                </div>
                
                <hr class="my-5">
                
                <p class="text-muted small">
                    If the problem persists, please <a href="mailto:support@freelancemarketplace.com">contact support</a>.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
