{% extends 'base.html' %}
{% load static %}

{% block title %}Logout - {{ PLATFORM_NAME }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-box-arrow-right text-primary" style="font-size: 4rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Sign Out</h3>
                    <p class="text-muted mb-4">Are you sure you want to sign out?</p>
                    
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="bi bi-box-arrow-right me-2"></i>Sign Out
                        </button>
                    </form>
                    
                    <a href="{% url 'core:home' %}" class="text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Go back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
